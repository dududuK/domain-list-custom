name: Build domains
on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
  push:
    branches:
      - master
    paths-ignore:
      - "**/README.md"
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout codebase
        uses: actions/checkout@master

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ./go.mod

      - name: Checkout v2fly/domain-list-community
        uses: actions/checkout@v4
        with:
          repository: v2fly/domain-list-community
          path: community

      - name: Checkout cokebar/gfwlist2dnsmasq
        uses: actions/checkout@v4
        with:
          repository: cokebar/gfwlist2dnsmasq
          path: gfwlist2dnsmasq

      - name: Set variables and append attributes
        run: |
          echo "update_version=$(date -d '+8 hours' +%Y-%m-%d)" >> ${GITHUB_ENV}
          echo "include:geolocation-!cn @cn" >> ./community/data/cn
          echo "include:geolocation-cn @!cn" >> ./community/data/geolocation-\!cn
        shell: bash

      - name: Generate geosite.dat and initial domains
        run: |
          go run ./ --datapath=./community/data/
          mkdir -p ./tmp ./domains
        shell: bash

      - name: Define rule sources
        run: |
          cat <<EOF > rules.json
          {
            "fakeip_filter": {
              "url": "https://raw.githubusercontent.com/juewuy/ShellCrash/dev/public/fake_ip_filter.list",
              "suffix_filter": "grep -v '.\*' | grep -E '\*|\+' | sed 's/^[*+]\.//'",
              "other_filter": "grep -Ev '#|\+|\*|Mijia' | sed 's/^/DOMAIN,/'",
              "regex_filter": "grep '.\*' | grep -E '\*|\+' | sed -e 's/^*/.\*/' -e 's/^+/.\+/' -e 's/^/DOMAIN-REGEX,/'"
            },
            "fakeip-filter-lite": {
              "url": "https://raw.githubusercontent.com/juewuy/ShellCrash/dev/public/fake_ip_filter.list",
              "static": [
                "DOMAIN,adguardteam.github.io",
                "DOMAIN,adrules.top",
                "DOMAIN,anti-ad.net",
                "DOMAIN,local.adguard.org",
                "DOMAIN,static.adtidy.org",
                "DOMAIN-SUFFIX,steamcontent.com"
              ],
              "suffix_filter": "grep -E 'ntp|time|stun' | grep -v '.\*' | grep -E '\*|\+' | sed 's/^[*+]\./DOMAIN-SUFFIX,/'",
              "regex_filter": "grep -E 'ntp|time|stun' | grep '.\*' | grep -E '\*|\+' | sed -e 's/^*/.\*/' -e 's/^+/.\+/' -e 's/^/DOMAIN-REGEX,/'"
            },
            "applications": {
              "urls": [
                "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Download/Download.list",
                "https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/applications.txt"
              ],
              "suffix_filter": "grep -Ev '#|IP-'",
              "other_filter": "grep -v 'payload:' | sed -e 's/^[ \t]*- //'"
            },
            "private": {
              "url": "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Lan/Lan.list",
              "url2": "https://raw.githubusercontent.com/XIU2/TrackersListCollection/master/all.txt",
              "static": [
                "DOMAIN,yacd.haishan.me",
                "DOMAIN,yacd.metacubex.one",
                "DOMAIN,d.metacubex.one",
                "DOMAIN,metacubex.github.io",
                "DOMAIN,metacubexd.pages.dev",
                "DOMAIN,board.zash.run.place"
              ],
              "suffix_filter": "grep 'DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '#|IP-|DOMAIN-SUFFIX,'"
            },
            "ads": {
              "url": "https://raw.githubusercontent.com/privacy-protection-tools/anti-AD/master/anti-ad-clash.yaml",
              "suffix_filter": "grep -Ev '#|payload:' | sed -e '/^\s*$/d' -e 's/'$//' -e 's/^[ \t]*//' -e 's/^- '+\./DOMAIN-SUFFIX,/' -e 's/^- '/DOMAIN,/'"
            },
            "microsoft-cn": {
              "file": "microsoft.txt",
              "filter": "grep '@cn$' | sed -e 's/^full:/DOMAIN,/' -e 's/^domain:/DOMAIN-SUFFIX,/' -e 's/^keyword:/DOMAIN-KEYWORD,/' -e 's/^regexp:/DOMAIN-REGEX,/' -e 's/:@cn$//'"
            },
            "apple-cn": {
              "file": "apple.txt",
              "filter": "grep '@cn$' | sed -e 's/^full:/DOMAIN,/' -e 's/^domain:/DOMAIN-SUFFIX,/' -e 's/^keyword:/DOMAIN-KEYWORD,/' -e 's/^regexp:/DOMAIN-REGEX,/' -e 's/:@cn$//'"
            },
            "google-cn": {
              "file": "google.txt",
              "filter": "grep '@cn$' | sed -e 's/^full:/DOMAIN,/' -e 's/^domain:/DOMAIN-SUFFIX,/' -e 's/^keyword:/DOMAIN-KEYWORD,/' -e 's/^regexp:/DOMAIN-REGEX,/' -e 's/:@cn$//'"
            },
            "games-cn": {
              "urls": [
                "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/SteamCN/SteamCN.list",
                "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Game/GameDownloadCN/GameDownloadCN.list"
              ],
              "file": "category-games.txt",
              "suffix_filter": "grep 'DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '#|IP-|DOMAIN-SUFFIX,'"
            },
            "netflix": {
              "url": "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Netflix/Netflix.list",
              "file": "netflix.txt",
              "suffix_filter": "grep 'DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '#|IP-|DOMAIN-SUFFIX,'"
            },
            "disney": {
              "url": "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Disney/Disney.list",
              "file": "disney.txt",
              "suffix_filter": "grep 'DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '#|IP-|DOMAIN-SUFFIX,'"
            },
            "max": {
              "url": "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/HBO/HBO.list",
              "file": "hbo.txt",
              "suffix_filter": "grep 'DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '#|IP-|DOMAIN-SUFFIX,'"
            },
            "primevideo": {
              "url": "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/PrimeVideo/PrimeVideo.list",
              "file": "primevideo.txt",
              "suffix_filter": "grep 'DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '#|IP-|DOMAIN-SUFFIX,'"
            },
            "appletv": {
              "url": "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/AppleTV/AppleTV.list",
              "file": "apple-tvplus.txt",
              "suffix_filter": "grep 'DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '#|IP-|DOMAIN-SUFFIX,'"
            },
            "youtube": {
              "url": "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/YouTube/YouTube.list",
              "file": "youtube.txt",
              "suffix_filter": "grep 'DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '#|IP-|DOMAIN-SUFFIX,'"
            },
            "tiktok": {
              "url": "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/TikTok/TikTok.list",
              "file": "tiktok.txt",
              "suffix_filter": "grep 'DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '#|IP-|DOMAIN-SUFFIX,'"
            },
            "bilibili": {
              "url": "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/BiliBili/BiliBili.list",
              "file": "bilibili.txt",
              "suffix_filter": "grep 'DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '#|IP-|DOMAIN-SUFFIX,'"
            },
            "ai": {
              "urls": [
                "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/OpenAI/OpenAI.list",
                "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Copilot/Copilot.list",
                "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Gemini/Gemini.list",
                "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Claude/Claude.list",
                "https://raw.githubusercontent.com/dler-io/Rules/refs/heads/main/Clash/Provider/AI%20Suite.yaml",
                "https://raw.githubusercontent.com/MetaCubeX/meta-rules-dat/refs/heads/meta/geo/geosite/category-ai-chat-!cn.list",
                "https://raw.githubusercontent.com/lunartrees/My-Clash-Rules/refs/heads/main/AI.list"
              ],
              "suffix_filter": "grep -E '^DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '^$|#|payload:|IP-|DOMAIN-SUFFIX,'"
            },
            "proxy": {
              "url": "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Global/Global.list",
              "file": "geolocation-!cn.txt",
              "suffix_filter": "grep 'DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '#|IP-|DOMAIN-SUFFIX,'"
            },
            "proxylite": {
              "urls": [
                "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/ProxyGFWlist.list",
                "https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/ProxyMedia.list",
                "https://raw.githubusercontent.com/Na5h1ra/ru1es/refs/heads/main/Clash/Ruleset/Outside.list",
                "https://raw.githubusercontent.com/Na5h1ra/ru1es/refs/heads/main/Clash/Ruleset/OutsideMedia.list",
                "https://raw.githubusercontent.com/Na5h1ra/ru1es/refs/heads/main/Clash/Ruleset/P0rn.list"
              ],
              "suffix_filter": "grep -E '^DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '^$|#|IP-|DOMAIN-SUFFIX,'"
            },
            "networktest": {
              "url": "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Speedtest/Speedtest.list",
              "file": "speedtest.txt",
              "static": [
                "DOMAIN-KEYWORD,ipv6-test",
                "DOMAIN-KEYWORD,ipv6test",
                "DOMAIN-KEYWORD,test-ipv6",
                "DOMAIN-KEYWORD,testipv6"
              ],
              "suffix_filter": "grep 'DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '#|IP-|DOMAIN-SUFFIX,'"
            },
            "tld-proxy": {
              "file": "tld-!cn.txt",
              "filter": "sed 's/^domain:/DOMAIN-SUFFIX,/'"
            },
            "tld-cn": {
              "file": "tld-cn.txt",
              "filter": "sed 's/^domain:/DOMAIN-SUFFIX,/'"
            },
            "cn": {
              "url": "https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMax/ChinaMax.list",
              "file": "cn.txt",
              "suffix_filter": "grep 'DOMAIN-SUFFIX,' | sed 's/DOMAIN-SUFFIX,//'",
              "other_filter": "grep -Ev '#|IP-|DOMAIN-SUFFIX,'"
            }
          }
          EOF
        shell: bash

      - name: Generate domain lists
        run: |
          # Helper function to process URLs
          process_urls() {
            local urls=("$@")
            local output_file=$1
            shift
            for url in "${urls[@]}"; do
              curl -sSL "$url" | eval "$suffix_filter" >> "$output_file-suffix.txt"
              curl -sSL "$url" | eval "$other_filter" >> "$output_file-other.txt"
            done
          }

          # Helper function to process file
          process_file() {
            local file=$1
            local filter=$2
            local output_file=$3
            if [ -f "./publish/$file" ]; then
              grep '^domain:' "./publish/$file" | sed -E 's/^domain://' | sed -E 's/:@(cn|!cn)$//' >> "$output_file-suffix.txt"
              grep -v '^domain:' "./publish/$file" | sed -e 's/^full:/DOMAIN,/' -e 's/^keyword:/DOMAIN-KEYWORD,/' -e 's/^regexp:/DOMAIN-REGEX,/' | sed -E 's/:@(cn|!cn)$//' >> "$output_file-other.txt"
            fi
            if [ -n "$filter" ]; then
              cat "./publish/$file" | eval "$filter" >> "$output_file-other.txt"
            fi
          }

          # Helper function to append static entries
          append_static() {
            local static_entries=("$@")
            for entry in "${static_entries[@]}"; do
              echo "$entry" >> "$output_file-other.txt"
            done
          }

          # Process each rule
          rules=$(jq -r 'keys[]' rules.json)
          for rule in $rules; do
            output_file="./tmp/temp-$rule"
            suffix_filter=$(jq -r ".\"$rule\".suffix_filter // \"\"" rules.json)
            other_filter=$(jq -r ".\"$rule\".other_filter // \"\"" rules.json)
            regex_filter=$(jq -r ".\"$rule\".regex_filter // \"\"" rules.json)
            file=$(jq -r ".\"$rule\".file // \"\"" rules.json)
            filter=$(jq -r ".\"$rule\".filter // \"\"" rules.json)
            urls=($(jq -r ".\"$rule\".urls[] // []" rules.json))
            url=$(jq -r ".\"$rule\".url // \"\"" rules.json)
            url2=$(jq -r ".\"$rule\".url2 // \"\"" rules.json)
            static=($(jq -r ".\"$rule\".static[] // []" rules.json))

            # Process URLs
            if [ -n "$url" ]; then
              process_urls "$url" "$output_file"
            fi
            if [ -n "$url2" ]; then
              curl -sSL "$url2" | grep -i '\.[A-Z]' | awk -F'[/:]' '{print $4}' | sed 's/^/DOMAIN,/' >> "$output_file-other.txt"
            fi
            if [ ${#urls[@]} -gt 0 ]; then
              process_urls "$output_file" "${urls[@]}"
            fi
            if [ -n "$regex_filter" ]; then
              curl -sSL "$url" | eval "$regex_filter" >> "$output_file-other.txt"
            fi

            # Process file
            if [ -n "$file" ]; then
              process_file "$file" "$filter" "$output_file"
            fi

            # Append static entries
            if [ ${#static[@]} -gt 0 ]; then
              append_static "${static[@]}"
            fi

            # Sort and deduplicate
            sort --ignore-case -u "$output_file-suffix.txt" > "$output_file-suffix-sorted.txt"
            sort --ignore-case -u "$output_file-other.txt" > "$output_file-other-sorted.txt"
          done

          # Special case for proxy (gfwlist2dnsmasq)
          chmod +x ./gfwlist2dnsmasq/gfwlist2dnsmasq.sh
          ./gfwlist2dnsmasq/gfwlist2dnsmasq.sh -l -o ./tmp/temp-proxy-suffix.txt
        shell: bash

      - name: Deduplicate and filter domains
        run: |
          chmod +x ./tools/deduplication.py ./tools/filter.sh
          rules=(fakeip-filter fakeip-filter-lite applications private ads microsoft-cn apple-cn google-cn games-cn netflix disney max primevideo appletv youtube tiktok bilibili ai proxy proxylite networktest tld-proxy tld-cn cn)
          for rule in "${rules[@]}"; do
            if [ -f "./tmp/temp-$rule-suffix-sorted.txt" ]; then
              ./tools/deduplication.py "./tmp/temp-$rule-suffix-sorted.txt" "./tmp/$rule-deleted-unsort-suffix.txt" || touch "./tmp/$rule-deleted-unsort-suffix.txt"
              sort --ignore-case "./tmp/$rule-deleted-unsort-suffix.txt" > "./tmp/$rule-deleted-sort-suffix.txt"
              diff "./tmp/$rule-deleted-sort-suffix.txt" "./tmp/temp-$rule-suffix-sorted.txt" | awk '/^>/{print $2}' | sed 's/^/DOMAIN-SUFFIX,/' > "./tmp/$rule-without-redundant-suffix.txt"
              cat "./tmp/$rule-without-redundant-suffix.txt" "./tmp/temp-$rule-other-sorted.txt" | sed '/^[[:space:]]*$/d' | sed 's/^[[:space:]]*//' | sed 's/[[:space:]]*$//' | sort -u > "./tmp/$rule-redundant.txt"
              ./tools/filter.sh "./tmp/$rule-redundant.txt" > "./domains/$rule.list"
            fi
          done
          rm -rf ./tmp ./publish
        shell: bash

      - name: Release and push domains
        run: |
          cd ./domains || exit 1
          git init && git config user.name "github-actions[bot]" && git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b domains
          git add . && git commit -m "mihomo rule-set 规则集文件更新于 ${update_version}"
          git remote add origin "https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin domains
          for file in *; do
            curl -i "https://purge.jsdelivr.net/gh/${{ github.repository }}@domains/${file}"
          done
        shell: bash

      - name: Upload release assets
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          release_name: domains
          tag: domains
          overwrite: true
          body: |
            [mihomo](https://github.com/MetaCubeX/mihomo) rule-set 规则集文件，规则类型包含 `DOMAIN`、`DOMAIN-SUFFIX`、`DOMAIN-KEYWORD`、`DOMAIN-REGEX` 和 `PROCESS-NAME`
            规则集文件更新于 ${{ env.update_version }}
          file_glob: true
          file: ./domains/*

      - name: Delete old workflow runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          retain_days: 3
          keep_minimum_runs: 1
